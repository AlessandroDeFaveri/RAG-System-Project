services:
  # Vector Database - Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"  # API REST
      - "6334:6334"  # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage # persistenza dei dati
    restart: unless-stopped

  # LLM - Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # RAG Application
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    depends_on:
      - qdrant
      - ollama
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=ollama
      - DATA_PATH=/app/data
      - LLM_MODEL=llama3.2
    volumes:
      - ./data:/app/data              # PDF da indicizzare
      - ./evaluation_results:/app/evaluation_results  # Output CSV
    # Comando: full-evaluation | evaluation | interactive | shell
    command: full-evaluation


volumes:
  ollama_data:
